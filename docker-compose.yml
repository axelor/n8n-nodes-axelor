version: '3.7'
services:
  postgres:
    image: postgres:14-alpine
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - n8n-net

  n8n:
    build:
      context: .
      network: host
    ports:
      - "5678:5678"
    env_file:
      - .env
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres
    networks:
      - n8n-net

volumes:
  pgdata:
  n8n_data:

networks:
  n8n-net:
    driver: bridge
